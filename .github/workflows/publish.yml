name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Bundle extension
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o vscode-gregorio.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath vscode-gregorio.vsix

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            vscode-gregorio.vsix \
            --title "${{ github.ref_name }}" \
            --generate-notes

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Bundle extension
        run: npm run build

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies -o vscode-gregorio.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: vscode-gregorio-vsix
          path: vscode-gregorio.vsix
